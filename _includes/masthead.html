<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="#about-me" class="masthead__wordmark">Yulin&nbsp;Luo</a>
          </li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              <a href="{{ domain }}{{ link.url }}" data-section="{{ link.url | split: '#' | last }}">{{ site.t.en[link.title] | default: link.title }}</a>
            </li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle dark mode" title="切换明暗主题">
        <i class="fas fa-moon" aria-hidden="true"></i>
      </button>
    </div>
  </div>
</div>
