<script>
    $(document).ready(function () {
        var gsDataUrls = [
            'https://raw.githubusercontent.com/{{ site.repository }}/google-scholar-stats/gs_data.json',
            'https://cdn.jsdelivr.net/gh/{{ site.repository }}@google-scholar-stats/gs_data.json'
        ];

        function updateScholarStats(data) {
            var totalCitation = data['citedby']
            var totalCitationEle = document.getElementById('total_cit');
            if (totalCitationEle && totalCitation) {
                totalCitationEle.innerHTML = totalCitation;
            }
            var scholarBadgeImgs = document.querySelectorAll('.scholar-badge img');
            Array.prototype.forEach.call(scholarBadgeImgs, element => {
                element.src = 'https://img.shields.io/badge/Google%20Scholar-' + totalCitation + '%20Citations-9cf?logo=google-scholar&labelColor=f6f6f6&style=flat';
                element.alt = 'Google Scholar citations: ' + totalCitation;
            });
            var citationEles = document.getElementsByClassName('show_paper_citations')
            Array.prototype.forEach.call(citationEles, element => {
                var paperId = element.getAttribute('data')
                var paper = data['publications'][paperId]
                if (!paper) return;
                var numCitations = paper['num_citations']
                element.innerHTML = '| Citations: ' + numCitations;
            });
        }

        function fetchScholarStats(urlIndex) {
            if (urlIndex >= gsDataUrls.length) return;
            var cacheBust = (gsDataUrls[urlIndex].includes('?') ? '&' : '?') + 't=' + Date.now();
            $.getJSON(gsDataUrls[urlIndex] + cacheBust)
                .done(updateScholarStats)
                .fail(function () { fetchScholarStats(urlIndex + 1); });
        }

        fetchScholarStats(0);
    })
</script>
