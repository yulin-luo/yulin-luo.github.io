name: Get Citation Data

on:
  # Run daily at 08:00 UTC
  schedule:
    - cron: '0 8 * * *'
  # Allow manual trigger
  workflow_dispatch:
  # Refresh citation data whenever the site source changes.
  push:
    branches: ["main"]
    paths:
      - 'google_scholar_crawler/**'
      - '.github/workflows/google_scholar_crawler.yaml'
      - '_includes/fetch_google_scholar_stats.html'
      - '_pages/about.md'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install requirements
        run: |
          cd ./google_scholar_crawler
          if [ -s requirements.txt ]; then
            pip install --upgrade pip
            pip install -r requirements.txt
          fi

      - name: Run Google Scholar crawler
        working-directory: ./google_scholar_crawler
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: python main.py

      - name: Push citation data to stats branch
        working-directory: ./google_scholar_crawler/results
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add *.json
          git commit -m "Updated citation data" || exit 0
          git push "https://github-actions:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:google-scholar-stats --force
