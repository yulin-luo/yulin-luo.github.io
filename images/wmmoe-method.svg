    <path d="M34 170 C75 130 110 145 145 105 C173 74 189 83 208 64 V203 H34 Z" fill="#14532d" opacity="0.32"/>
    <path d="M55 169 H190" stroke="#064e3b" stroke-opacity="0.50" stroke-width="7" stroke-linecap="round"/>
    <circle cx="170" cy="86" r="18" fill="#fef3c7"/>
    <text x="121" y="237" text-anchor="middle" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">cleaner vision input</text>
  </g>

  <g transform="translate(448 520)">
    <rect width="188" height="42" rx="21" fill="rgba(255,255,255,0.10)" stroke="#7dd3fc" stroke-opacity="0.40"/>
    <text x="94" y="27" text-anchor="middle" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">blind weather setting</text>
  </g>
  <g transform="translate(664 520)">
    <rect width="242" height="42" rx="21" fill="rgba(255,255,255,0.10)" stroke="#fde68a" stroke-opacity="0.42"/>
    <text x="121" y="27" text-anchor="middle" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">weather/content decoupling</text>
  </g>
  <g transform="translate(934 520)">
    <rect width="260" height="42" rx="21" fill="rgba(255,255,255,0.10)" stroke="#86efac" stroke-opacity="0.42"/>
    <text x="130" y="27" text-anchor="middle" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">downstream segmentation benefits</text>
