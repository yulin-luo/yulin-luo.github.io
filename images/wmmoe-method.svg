    <marker id="arrowGreen" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto">
      <path d="M0,0 L18,9 L0,18 Z" fill="#34d399"/>
    </marker>
  </defs>

  <rect width="1333" height="617" rx="34" fill="url(#bg)"/>
  <g opacity="0.13" stroke="#e0f2fe" stroke-width="1">
    <path d="M0 105 H1333"/><path d="M0 210 H1333"/><path d="M0 315 H1333"/><path d="M0 420 H1333"/><path d="M0 525 H1333"/>
    <path d="M120 0 V617"/><path d="M240 0 V617"/><path d="M360 0 V617"/><path d="M480 0 V617"/><path d="M600 0 V617"/>
    <path d="M720 0 V617"/><path d="M840 0 V617"/><path d="M960 0 V617"/><path d="M1080 0 V617"/><path d="M1200 0 V617"/>
