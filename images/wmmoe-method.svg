    <path d="M35 176 C70 140 100 148 135 112 C164 82 184 91 215 68 V203 H33 Z" fill="#020617" opacity="0.35"/>
    <g stroke="#e0f2fe" stroke-width="5" stroke-linecap="round" opacity="0.92">
