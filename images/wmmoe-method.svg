<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1333 617" role="img" aria-labelledby="title desc">
  <title id="title">WM-MoE method diagram</title>
  <desc id="desc">A concise method diagram for Weather-Aware Multi-Scale Mixture-of-Experts for blind adverse weather removal.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07172f"/>
      <stop offset="0.55" stop-color="#0d2f4d"/>
      <stop offset="1" stop-color="#0d3b31"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#102c55"/>
      <stop offset="1" stop-color="#0f513d"/>
    </linearGradient>
    <linearGradient id="inputGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#556476"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="cleanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8be9ff"/>
      <stop offset="0.48" stop-color="#7ddc8f"/>
      <stop offset="1" stop-color="#fff3b0"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7ad"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a5f3fc"/>
      <stop offset="1" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bbf7d0"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#020617" flood-opacity="0.38"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <marker id="arrowGold" markerWidth="18" markerHeight="18" refX="14" refY="9" orient="auto">
      <path d="M0,0 L18,9 L0,18 Z" fill="#fbbf24"/>
