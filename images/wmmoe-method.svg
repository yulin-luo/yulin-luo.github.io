  <text x="235" y="63" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">Weather-Aware Multi-Scale Mixture-of-Experts</text>
  <text x="56" y="98" fill="#bfdbfe" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">Blind adverse weather removal for unknown rain, haze, snow, and mixed weather</text>

