    <text x="229" y="47" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="900">WM-MoE Core</text>
    <text x="229" y="78" text-anchor="middle" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700">dynamic routing + multi-scale restoration</text>

    <rect x="38" y="112" width="172" height="88" rx="22" fill="rgba(250,204,21,0.18)" stroke="#fde68a" stroke-opacity="0.70"/>
    <text x="124" y="145" text-anchor="middle" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Weather-Aware</text>
    <text x="124" y="172" text-anchor="middle" fill="#fef3c7" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">Router</text>
    <text x="124" y="192" text-anchor="middle" fill="#fde68a" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">Top-K expert assignment</text>

    <rect x="247" y="112" width="172" height="88" rx="22" fill="rgba(14,165,233,0.18)" stroke="#7dd3fc" stroke-opacity="0.72"/>
    <text x="333" y="145" text-anchor="middle" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="900">WGF-CL</text>
    <text x="333" y="172" text-anchor="middle" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Weather Guidance</text>
    <text x="333" y="192" text-anchor="middle" fill="#bae6fd" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="800">decouple weather / content</text>

    <rect x="38" y="236" width="381" height="86" rx="24" fill="rgba(16,185,129,0.16)" stroke="#86efac" stroke-opacity="0.72"/>
    <text x="229" y="270" text-anchor="middle" fill="#dcfce7" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">Multi-Scale Experts</text>
    <text x="229" y="300" text-anchor="middle" fill="#bbf7d0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">local detail · structure · long-range context</text>

    <path d="M210 156 H238" stroke="#fbbf24" stroke-width="5" marker-end="url(#arrowGold)"/>
    <path d="M124 203 C125 224 152 232 178 238" stroke="#fbbf24" stroke-width="5" fill="none" marker-end="url(#arrowGold)"/>
    <path d="M333 203 C332 224 306 232 280 238" stroke="#38bdf8" stroke-width="5" fill="none" marker-end="url(#arrowGold)"/>
  </g>

  <path d="M913 300 C955 300 983 300 1024 300" stroke="#34d399" stroke-width="9" fill="none" marker-end="url(#arrowGreen)" filter="url(#glow)"/>

  <g transform="translate(1042 160)" filter="url(#shadow)">
    <rect width="242" height="270" rx="28" fill="rgba(255,255,255,0.12)" stroke="#86efac" stroke-opacity="0.58"/>
    <text x="121" y="42" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="900">Restored Image</text>
