  </g>

  <path d="M316 300 C360 300 382 300 423 300" stroke="#fbbf24" stroke-width="9" fill="none" marker-end="url(#arrowGold)" filter="url(#glow)"/>

  <g transform="translate(438 128)" filter="url(#shadow)">
